<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><meta name="description" content="لوحة تحكم مطعم أبو شهاب — Abu Shehab admin dashboard. عرض تجريبي من WebiQQ."><meta name="theme-color" content="#241d18"><title>لوحة التحكم · Dashboard — مطعم أبو شهاب</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="app.js" defer></script></head>
<body>
<div class="abar"><b data-i="aTitle">لوحة تحكم أبو شهاب</b><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center"><button class="lang-btn dark" aria-label="Switch language">EN · English</button><label style="display:flex;align-items:center;gap:8px;font:700 13px var(--sans)"><span data-i="aSpecial">طبق اليوم ⭐</span><select id="spec-sel" style="min-height:40px"></select></label><button class="mini" id="reset" style="color:#f5d9a0;border-color:#f5d9a0" data-i="aReset">إعادة ضبط العرض</button><a class="btn gold" href="index.html" style="padding:9px 20px;font-size:13px" data-i="aView">عرض الموقع ↗</a></div></div>
<div class="stats"><div class="stat" id="st-total"><b>0</b><span data-i="aStTotal">إجمالي الأصناف</span></div><div class="stat" id="st-hidden"><b>0</b><span data-i="aStHidden">أصناف مخفية</span></div><div class="stat" id="st-offers"><b>0</b><span data-i="aStOffers">عروض فعّالة</span></div><div class="stat" id="st-spec"><b>—</b><span data-i="aStSpec">طبق اليوم</span></div></div>
<p class="note" style="margin-top:26px" data-i="aNote"></p>
<div class="apanel"><h2 data-i="aAddH">إضافة صنف جديد</h2>
<form class="aform" id="add-form"><label class="wide"><span data-i="aName">اسم الصنف</span><input name="name" required></label><label><span data-i="aCat">القسم</span><select name="cat"><option value="starters" data-i="cats.starters">المقبلات</option><option value="mains" data-i="cats.mains">الأطباق الرئيسية</option><option value="drinks" data-i="cats.drinks">المشروبات</option><option value="desserts" data-i="cats.desserts">الحلويات</option></select></label><label><span data-i="aPrice">السعر (د.ب)</span><input name="price" type="number" step="0.100" min="0" required></label><label class="wide"><span data-i="aDesc">الوصف</span><input name="desc"></label><label><span data-i="aImg">الصورة</span><input name="img" type="file" accept="image/*"></label><button class="btn" type="submit" style="border-radius:12px" data-i="aAddBtn">+ أضف الصنف</button></form></div>
<div class="apanel"><h2 data-i="aManageH">إدارة المنيو</h2><div style="overflow-x:auto"><table class="atable"><thead><tr><th></th><th data-i="thItem">الصنف</th><th class="hide-m" data-i="thCat">القسم</th><th data-i="thPrice">السعر (د.ب)</th><th data-i="thVis">ظاهر؟</th><th class="hide-m"></th></tr></thead><tbody id="rows"></tbody></table></div></div>
<footer><p data-i="aFoot"></p></footer>
</body></html>
